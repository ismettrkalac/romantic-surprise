<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Duša mua ❤</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,600&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --pink: #ffd6e3;
    --pink-soft: #ffeaf1;
    --pink-mid: #f4a6c1;
    --burgundy: #7a1f3d;
    --burgundy-deep: #5c1530;
    --white: #fffaf9;
    --gold: #d9b26a;
  }

  *{ box-sizing: border-box; margin:0; padding:0; }

  html, body{
    width:100%;
    height:100%;
    overflow-x:hidden;
  }

  body{
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(160deg, var(--pink-soft) 0%, var(--pink) 45%, #fff 100%);
    color: var(--burgundy-deep);
    min-height:100vh;
    position:relative;
  }

  h1, h2, .display-font{
    font-family: 'Playfair Display', serif;
  }

  /* ---------- Background decor layer ---------- */
  #bg-decor{
    position:fixed;
    inset:0;
    width:100%;
    height:100%;
    overflow:hidden;
    z-index:1;
    pointer-events:none;
  }

  .floater{
    position:absolute;
    top:110%;
    opacity:0;
    will-change: transform, opacity;
    animation-name: floatUp;
    animation-timing-function: ease-in-out;
    animation-iteration-count: infinite;
  }

  .heart-floater{
    color: var(--pink-mid);
    filter: drop-shadow(0 0 6px rgba(122,31,61,0.25));
  }

  @keyframes floatUp{
    0%{ transform: translateY(0) translateX(0) rotate(0deg); opacity:0; }
    10%{ opacity:0.85; }
    50%{ transform: translateY(-55vh) translateX(20px) rotate(10deg); }
    90%{ opacity:0.6; }
    100%{ transform: translateY(-115vh) translateX(-15px) rotate(-8deg); opacity:0; }
  }

  .lily svg{ display:block; filter: drop-shadow(0 0 8px rgba(122,31,61,0.15)); }

  /* ---------- Loading Screen ---------- */
  #loading-screen{
    position:fixed;
    inset:0;
    z-index:100;
    display:flex;
    align-items:center;
    justify-content:center;
    background: radial-gradient(circle at center, var(--pink-soft) 0%, var(--pink) 60%, #f6c9db 100%);
    transition: opacity 1s ease, visibility 1s ease;
  }

  #loading-screen.hidden{
    opacity:0;
    visibility:hidden;
    pointer-events:none;
  }

  .loading-content{
    text-align:center;
    padding: 0 24px;
    animation: gentlePulse 2.4s ease-in-out infinite;
  }

  @keyframes gentlePulse{
    0%,100%{ transform: scale(1); }
    50%{ transform: scale(1.03); }
  }

  .loading-icon{
    font-size: 2.6rem;
    color: var(--burgundy);
    margin-bottom: 18px;
    animation: heartbeat 1.3s ease-in-out infinite;
  }

  @keyframes heartbeat{
    0%, 100%{ transform: scale(1); }
    25%{ transform: scale(1.18); }
    40%{ transform: scale(0.95); }
    60%{ transform: scale(1.12); }
  }

  .loading-text{
    font-size: clamp(0.95rem, 2.6vw, 1.25rem);
    letter-spacing: 0.5px;
    color: var(--burgundy-deep);
    font-weight: 400;
    margin-bottom: 26px;
    font-style: italic;
  }

  .progress-bar-container{
    width: min(70vw, 320px);
    height: 6px;
    background: rgba(122,31,61,0.15);
    border-radius: 10px;
    overflow:hidden;
    margin: 0 auto;
    box-shadow: inset 0 1px 2px rgba(0,0,0,0.05);
  }

  .progress-bar{
    height:100%;
    width:0%;
    border-radius:10px;
    background: linear-gradient(90deg, var(--burgundy), var(--pink-mid), var(--gold));
    background-size: 200% 100%;
    transition: width 2.9s cubic-bezier(0.65,0,0.35,1);
    box-shadow: 0 0 12px rgba(122,31,61,0.5);
  }

  /* ---------- Match Found overlay ---------- */
  #match-found{
    position:fixed;
    inset:0;
    z-index:90;
    display:flex;
    align-items:center;
    justify-content:center;
    opacity:0;
    visibility:hidden;
    transition: opacity 1s ease, visibility 1s ease;
    background: radial-gradient(circle at center, var(--pink-soft) 0%, var(--pink) 70%);
  }

  #match-found.show{
    opacity:1;
    visibility:visible;
  }

  #match-found.hide{
    opacity:0;
    visibility:hidden;
  }

  .match-text{
    font-size: clamp(1.8rem, 6vw, 3.2rem);
    color: var(--burgundy);
    text-shadow: 0 0 20px rgba(122,31,61,0.35);
    letter-spacing: 1px;
    animation: matchPop 1.4s ease forwards;
  }

  @keyframes matchPop{
    0%{ transform: scale(0.7); opacity:0; }
    40%{ transform: scale(1.08); opacity:1; }
    70%{ transform: scale(1); }
    100%{ transform: scale(1); opacity:1; }
  }

  /* ---------- Main content ---------- */
  #main-content{
    position:relative;
    z-index:5;
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding: 40px 18px;
    opacity:0;
    transition: opacity 1.4s ease;
  }

  #main-content.show{
    opacity:1;
  }

  .glass-card{
    position:relative;
    width:100%;
    max-width: 620px;
    padding: clamp(32px, 6vw, 64px) clamp(24px, 6vw, 56px);
    border-radius: 28px;
    background: rgba(255,255,255,0.35);
    backdrop-filter: blur(18px) saturate(160%);
    -webkit-backdrop-filter: blur(18px) saturate(160%);
    border: 1px solid rgba(255,255,255,0.55);
    box-shadow:
      0 8px 40px rgba(122,31,61,0.18),
      0 0 60px rgba(255,209,220,0.5),
      inset 0 1px 1px rgba(255,255,255,0.6);
    text-align:center;
    opacity:0;
    transform: translateY(24px);
    animation: cardFadeIn 1.4s ease forwards;
  }

  @keyframes cardFadeIn{
    to{ opacity:1; transform: translateY(0); }
  }

  .glow-ring{
    position:absolute;
    inset:-2px;
    border-radius: 30px;
    background: linear-gradient(135deg, rgba(217,178,106,0.4), rgba(122,31,61,0.15), rgba(244,166,193,0.5));
    filter: blur(18px);
    z-index:-1;
    opacity:0.7;
    animation: glowPulse 4s ease-in-out infinite;
  }

  @keyframes glowPulse{
    0%,100%{ opacity:0.5; }
    50%{ opacity:0.85; }
  }

  .sparkle-emoji{
    font-size: clamp(1rem, 3vw, 1.3rem);
    letter-spacing: 2px;
    color: var(--gold);
    margin-bottom: 14px;
    opacity:0;
    animation: fadeInUp 1s ease 0.2s forwards;
  }

  .main-title{
    font-size: clamp(1.6rem, 5vw, 2.6rem);
    line-height: 1.3;
    color: var(--burgundy);
    font-weight: 700;
    margin-bottom: 22px;
    opacity:0;
    animation: fadeInUp 1s ease 0.5s forwards;
    text-shadow: 0 0 24px rgba(244,166,193,0.5);
  }

  .message{
    font-size: clamp(0.95rem, 2.4vw, 1.12rem);
    line-height: 1.85;
    color: var(--burgundy-deep);
    font-weight: 300;
    margin-bottom: 30px;
    opacity:0;
    animation: fadeInUp 1s ease 0.9s forwards;
  }

  .signature{
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-size: clamp(1.05rem, 2.8vw, 1.35rem);
    color: var(--burgundy);
    margin-bottom: 34px;
    opacity:0;
    animation: fadeInUp 1s ease 1.3s forwards;
  }

  @keyframes fadeInUp{
    from{ opacity:0; transform: translateY(16px); }
    to{ opacity:1; transform: translateY(0); }
  }

  #reveal-btn{
    font-family: 'Poppins', sans-serif;
    font-size: clamp(0.85rem, 2.2vw, 1rem);
    font-weight: 500;
    letter-spacing: 0.5px;
    color: var(--white);
    background: linear-gradient(135deg, var(--burgundy), #92304f);
    border: none;
    padding: 14px 34px;
    border-radius: 40px;
    cursor:pointer;
    box-shadow: 0 6px 22px rgba(122,31,61,0.4);
    transition: transform 0.35s ease, box-shadow 0.35s ease;
    opacity:0;
    animation: fadeInUp 1s ease 1.7s forwards;
  }

  #reveal-btn:hover{
    transform: translateY(-3px) scale(1.03);
    box-shadow: 0 10px 30px rgba(122,31,61,0.55);
  }

  #reveal-btn:active{
    transform: translateY(0) scale(0.98);
  }

  #reveal-btn.fading-out{
    opacity:0 !important;
    pointer-events:none;
    transition: opacity 0.6s ease;
  }

  /* ---------- Final reveal ---------- */
  .final-message{
    margin-top: 30px;
    max-height:0;
    overflow:hidden;
    opacity:0;
    transition: max-height 1.2s ease, opacity 1.2s ease, margin-top 1.2s ease;
  }

  .final-message.show{
    max-height: 520px;
    opacity:1;
  }

  .final-message p{
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-size: clamp(1.1rem, 3.4vw, 1.5rem);
    color: var(--burgundy);
    line-height: 1.6;
    text-shadow: 0 0 18px rgba(217,178,106,0.5);
    padding-top: 22px;
    border-top: 1px solid rgba(122,31,61,0.2);
  }

  .ending-lilies{
    display:flex;
    align-items:flex-end;
    justify-content:center;
    gap:10px;
    margin-top: 24px;
    padding-top: 18px;
    border-top: 1px solid rgba(122,31,61,0.12);
    opacity:0;
    transform: translateY(14px) scale(0.96);
    transition: opacity 0.9s ease, transform 0.9s ease;
  }

  .ending-lilies.show{
    opacity:1;
    transform: translateY(0) scale(1);
  }

  .ending-lily{
    filter: drop-shadow(0 8px 16px rgba(122,31,61,0.12));
    transform-origin: bottom center;
    animation: lilySway 4.8s ease-in-out infinite;
  }

  .ending-lily:nth-child(2n){
    animation-duration: 5.2s;
  }

  .ending-lily:nth-child(3n){
    animation-duration: 5.8s;
  }

  .ending-lily.tall{
    margin-bottom: 8px;
  }

  /* ---------- Confetti & sparkle canvas layers ---------- */
  #effects-layer{
    position:fixed;
    inset:0;
    z-index:60;
    pointer-events:none;
    overflow:hidden;
  }

  .confetti-piece{
    position:absolute;
    top:-5%;
    border-radius:2px;
  }

  .sparkle{
    position:absolute;
    color: var(--gold);
    font-size: 14px;
    opacity:0;
    animation: twinkle 1.8s ease-in-out infinite;
  }

  #music-toggle{
    position: fixed;
    right: 18px;
    bottom: 18px;
    z-index: 80;
    border: 1px solid rgba(255,255,255,0.65);
    border-radius: 999px;
    padding: 12px 18px;
    font-family: 'Poppins', sans-serif;
    font-size: 0.92rem;
    font-weight: 500;
    color: var(--burgundy);
    background: rgba(255,255,255,0.78);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    box-shadow: 0 10px 28px rgba(122,31,61,0.18);
    cursor: pointer;
    transition: transform 0.25s ease, box-shadow 0.25s ease, opacity 0.25s ease;
  }

  #music-toggle:hover:not([disabled]){
    transform: translateY(-2px);
    box-shadow: 0 14px 34px rgba(122,31,61,0.25);
  }

  #music-toggle[disabled]{
    opacity: 0.72;
    cursor: not-allowed;
  }

  .music-status{
    position: fixed;
    right: 18px;
    bottom: 72px;
    z-index: 80;
    max-width: min(78vw, 260px);
    padding: 10px 14px;
    border-radius: 16px;
    font-size: 0.8rem;
    line-height: 1.45;
    color: var(--burgundy-deep);
    background: rgba(255,255,255,0.74);
    border: 1px solid rgba(255,255,255,0.65);
    box-shadow: 0 8px 24px rgba(122,31,61,0.12);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    opacity: 0;
    transform: translateY(8px);
    pointer-events: none;
    transition: opacity 0.3s ease, transform 0.3s ease;
  }

  .music-status.show{
    opacity: 1;
    transform: translateY(0);
  }

  @keyframes lilySway{
    0%, 100%{ transform: rotate(-2deg); }
    50%{ transform: rotate(2deg); }
  }

  @keyframes twinkle{
    0%, 100%{ opacity:0; transform: scale(0.4) rotate(0deg); }
    50%{ opacity:1; transform: scale(1.1) rotate(90deg); }
  }

  /* ---------- Responsive tweaks ---------- */
  @media (max-width: 480px){
    .glass-card{ border-radius: 22px; }
    .progress-bar-container{ width: 78vw; }
  }
</style>
</head>
<body>

  <div id="bg-decor"></div>

  <div id="loading-screen">
    <div class="loading-content">
      <div class="loading-icon">❤</div>
      <p class="loading-text">Scanning for the most beautiful person...</p>
      <div class="progress-bar-container">
        <div class="progress-bar" id="progress-bar"></div>
      </div>
    </div>
  </div>

  <div id="match-found">
    <div class="match-text">✨ Match Found! ✨</div>
  </div>

  <div id="main-content">
    <div class="glass-card">
      <div class="glow-ring"></div>
      <div class="sparkle-emoji">✨ ✨ ✨</div>
      <h1 class="main-title">Emina, you are the most beautiful girl in the world.</h1>
      <p class="message">
        I love you more than words can ever describe.<br>
        Thank you for being in my life.<br>
        Every day with you is my favorite day. ❤️
      </p>
      <p class="signature">Forever yours,<br>Ismet ❤️</p>
      <button id="reveal-btn">One more thing...</button>

      <div class="final-message" id="final-message">
        <p>Zauvek samo ti.</p>
        <div class="ending-lilies" id="ending-lilies" aria-hidden="true"></div>
      </div>
    </div>
  </div>

  <div id="effects-layer"></div>
  <div class="music-status" id="music-status" aria-live="polite"></div>
  <button id="music-toggle" type="button">♪ Play a song</button>
  <audio id="bg-music" loop preload="metadata">
    <source src="assets/our-song.mp3" type="audio/mpeg">
  </audio>

<script>
(function(){

  // ---------- Utility ----------
  function rand(min, max){ return Math.random() * (max - min) + min; }

  // ---------- Pink Lily SVG template (realistic pointed petals) ----------
  function lilySVG(size, shade){
    // shade: 'light' | 'mid' | 'deep' -- all within the pink family
    var palettes = {
      light: { outer: '#ffe3ee', inner: '#ffb6d1', vein: '#f487ae' },
      mid:   { outer: '#ffc2dc', inner: '#f68fb6', vein: '#e0568f' },
      deep:  { outer: '#ffa9cb', inner: '#ef6f9e', vein: '#c94577' }
    };
    var p = palettes[shade] || palettes.mid;
    var id = 'lily' + Math.floor(Math.random() * 1000000);
    var rot = Math.floor(rand(0, 60));

    // A single pointed, gently curved lily petal, drawn 6 times around the center.
    var petalPath = 'M50,52 C38,44 30,24 38,6 C42,-2 48,0 50,4 ' +
                     'C52,0 58,-2 62,6 C70,24 62,44 50,52 Z';
    var veinPath = 'M50,50 C49,36 50,18 50,4';

    var petals = '';
    for (var i = 0; i < 6; i++){
      var angle = rot + i * 60;
      petals += '<g transform="rotate(' + angle + ' 50 50)">' +
        '<path d="' + petalPath + '" fill="url(#' + id + ')" stroke="' + p.vein + '" stroke-width="0.4" opacity="0.95"/>' +
        '<path d="' + veinPath + '" fill="none" stroke="' + p.vein + '" stroke-width="0.5" opacity="0.4"/>' +
        '</g>';
    }

    // Stamens curling out from the center, tipped with soft gold.
    var stamens = '';
    for (var s = 0; s < 5; s++){
      var sAngle = s * 72 + rot / 2;
      stamens += '<g transform="rotate(' + sAngle + ' 50 50)">' +
        '<path d="M50,50 C50,42 47,34 46,29" fill="none" stroke="' + p.vein + '" stroke-width="0.9" opacity="0.85"/>' +
        '<ellipse cx="46" cy="28" rx="1.8" ry="2.6" fill="#d9b26a"/>' +
        '</g>';
    }

    return '<svg viewBox="0 0 100 100" width="' + size + '" height="' + size + '">' +
      '<defs><radialGradient id="' + id + '" cx="50%" cy="85%" r="90%">' +
      '<stop offset="0%" stop-color="' + p.inner + '"/>' +
      '<stop offset="100%" stop-color="' + p.outer + '"/>' +
      '</radialGradient></defs>' +
      '<g>' + petals + '</g>' +
      stamens +
      '</svg>';
  }

  // ---------- Background ambient floaters (continuous, gentle) ----------
  var bgDecor = document.getElementById('bg-decor');
  var lilyShades = ['light', 'mid', 'deep'];

  function spawnAmbientFloater(){
    var isLily = Math.random() < 0.62;
    var el = document.createElement('div');
    el.className = 'floater';
    var size = rand(26, 54);
    var duration = rand(14, 24);
    var delay = rand(0, 10);
    el.style.left = rand(2, 95) + 'vw';
    el.style.animationDuration = duration + 's';
    el.style.animationDelay = delay + 's';

    if (isLily){
      el.classList.add('lily');
      el.innerHTML = lilySVG(size, lilyShades[Math.floor(rand(0, lilyShades.length))]);
    } else {
      el.classList.add('heart-floater');
      el.style.fontSize = rand(14, 26) + 'px';
      el.textContent = '❤';
    }
    bgDecor.appendChild(el);
  }

  for (var i = 0; i < 26; i++){ spawnAmbientFloater(); }

  // ---------- Loading sequence ----------
  var loadingScreen = document.getElementById('loading-screen');
  var progressBar = document.getElementById('progress-bar');
  var matchFound = document.getElementById('match-found');
  var mainContent = document.getElementById('main-content');

  window.addEventListener('load', function(){
    requestAnimationFrame(function(){
      progressBar.style.width = '100%';
    });

    setTimeout(function(){
      loadingScreen.classList.add('hidden');
      matchFound.classList.add('show');

      setTimeout(function(){
        matchFound.classList.add('hide');
        mainContent.classList.add('show');
      }, 1700);

    }, 3000);
  });

  // ---------- "One more thing..." reveal ----------
  var revealBtn = document.getElementById('reveal-btn');
  var finalMessage = document.getElementById('final-message');
  var endingLilies = document.getElementById('ending-lilies');
  var effectsLayer = document.getElementById('effects-layer');
  var musicToggle = document.getElementById('music-toggle');
  var musicStatus = document.getElementById('music-status');
  var bgMusic = document.getElementById('bg-music');
  var musicStatusTimer = null;

  function showMusicStatus(message){
    musicStatus.textContent = message;
    musicStatus.classList.add('show');
    clearTimeout(musicStatusTimer);
    musicStatusTimer = setTimeout(function(){
      musicStatus.classList.remove('show');
    }, 3200);
  }

  function updateMusicButton(){
    musicToggle.textContent = bgMusic.paused ? '♪ Play a song' : '❚❚ Pause the song';
    musicToggle.setAttribute('aria-pressed', bgMusic.paused ? 'false' : 'true');
  }

  musicToggle.addEventListener('click', function(){
    if (musicToggle.disabled){
      return;
    }

    if (bgMusic.paused){
      bgMusic.play().then(function(){
        updateMusicButton();
      }).catch(function(){
        showMusicStatus('Add your song as assets/our-song.mp3 to enable playback.');
      });
      return;
    }

    bgMusic.pause();
    updateMusicButton();
  });

  bgMusic.addEventListener('play', updateMusicButton);
  bgMusic.addEventListener('pause', updateMusicButton);
  bgMusic.addEventListener('error', function(){
    musicToggle.disabled = true;
    musicToggle.textContent = '♪ Song unavailable';
    showMusicStatus('Drop an MP3 at assets/our-song.mp3 and refresh the page.');
  });

  updateMusicButton();

  function renderEndingLilies(){
    if (endingLilies.children.length){
      return;
    }

    var bouquet = [
      { size: 64, shade: 'light', className: 'ending-lily' },
      { size: 82, shade: 'mid', className: 'ending-lily tall' },
      { size: 74, shade: 'deep', className: 'ending-lily' },
      { size: 82, shade: 'mid', className: 'ending-lily tall' },
      { size: 64, shade: 'light', className: 'ending-lily' }
    ];

    bouquet.forEach(function(item){
      var flower = document.createElement('div');
      flower.className = item.className;
      flower.innerHTML = lilySVG(item.size, item.shade);
      endingLilies.appendChild(flower);
    });
  }

  function burstFloaters(){
    for (var i = 0; i < 30; i++){
      (function(idx){
        setTimeout(function(){
          var isLily = Math.random() < 0.62;
          var el = document.createElement('div');
          el.className = 'floater';
          var size = rand(24, 52);
          var duration = rand(6, 11);
          el.style.left = rand(0, 98) + 'vw';
          el.style.animationDuration = duration + 's';
          el.style.zIndex = 55;

          if (isLily){
            el.classList.add('lily');
            el.innerHTML = lilySVG(size, lilyShades[Math.floor(rand(0, lilyShades.length))]);
          } else {
            el.classList.add('heart-floater');
            el.style.fontSize = rand(16, 34) + 'px';
            el.textContent = '❤';
          }
          bgDecor.appendChild(el);

          setTimeout(function(){ el.remove(); }, (duration + 1) * 1000);
        }, idx * 60);
      })(i);
    }
  }

  function confettiBurst(){
    var colors = ['#7a1f3d', '#f4a6c1', '#ffd6e3', '#d9b26a', '#fffaf9'];
    for (var i = 0; i < 60; i++){
      var piece = document.createElement('div');
      piece.className = 'confetti-piece';
      var w = rand(6, 11);
      var h = rand(10, 16);
      piece.style.width = w + 'px';
      piece.style.height = h + 'px';
      piece.style.left = rand(0, 100) + 'vw';
      piece.style.background = colors[Math.floor(rand(0, colors.length))];
      effectsLayer.appendChild(piece);

      var endY = window.innerHeight + 60;
      var drift = rand(-120, 120);
      var rotation = rand(180, 720) * (Math.random() < 0.5 ? -1 : 1);
      var duration = rand(2600, 4200);

      var anim = piece.animate([
        { transform: 'translate(0,0) rotate(0deg)', opacity: 1 },
        { transform: 'translate(' + drift + 'px,' + endY + 'px) rotate(' + rotation + 'deg)', opacity: 0.9 }
      ], {
        duration: duration,
        easing: 'cubic-bezier(0.25, 0.46, 0.45, 0.94)',
        fill: 'forwards'
      });

      (function(p){
        anim.onfinish = function(){ p.remove(); };
      })(piece);
    }
  }

  function sparkleField(){
    for (var i = 0; i < 24; i++){
      (function(){
        var s = document.createElement('div');
        s.className = 'sparkle';
        s.textContent = '✦';
        s.style.left = rand(5, 95) + 'vw';
        s.style.top = rand(5, 95) + 'vh';
        s.style.animationDelay = rand(0, 1.6) + 's';
        s.style.fontSize = rand(10, 20) + 'px';
        effectsLayer.appendChild(s);
        setTimeout(function(){ s.remove(); }, 6000);
      })();
    }
  }

  revealBtn.addEventListener('click', function(){
    revealBtn.classList.add('fading-out');
    burstFloaters();
    confettiBurst();

    setTimeout(function(){
      sparkleField();
      finalMessage.classList.add('show');
      renderEndingLilies();
      setTimeout(function(){
        endingLilies.classList.add('show');
      }, 420);
    }, 500);
  });

})();
</script>

</body>
</html>
